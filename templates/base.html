<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Smart Metro Assistance{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: "#eefcf6",
                            100: "#d7f5e5",
                            500: "#14b86a",
                            600: "#10945a",
                            700: "#0e7a4c",
                            900: "#0d3d2b"
                        },
                        metro: {
                            ink: "#10231d",
                            sand: "#f7f5ef",
                            rail: "#db7c26"
                        }
                    },
                    boxShadow: {
                        soft: "0 18px 45px rgba(16, 35, 29, 0.10)"
                    },
                    fontFamily: {
                        sans: ["Segoe UI", "Tahoma", "Geneva", "Verdana", "sans-serif"]
                    }
                }
            }
        };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body class="min-h-screen bg-metro-sand text-slate-900">
    <div class="page-shell">
        <header class="border-b border-emerald-100 bg-white/85 backdrop-blur">
            <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-4">
                <a href="{{ url_for('index') }}" class="flex items-center gap-3">
                    <div class="flex h-11 w-11 items-center justify-center rounded-2xl bg-brand-600 text-lg font-bold text-white shadow-soft">
                        MA
                    </div>
                    <div>
                        <p class="text-sm font-semibold uppercase tracking-[0.18em] text-brand-700">Graduation Project</p>
                        <h1 class="text-lg font-semibold text-metro-ink">Smart Metro Assistance</h1>
                    </div>
                </a>
                <nav class="flex items-center gap-3">
                    <a href="{{ url_for('index') }}" class="rounded-full px-4 py-2 text-sm font-medium text-slate-700 transition hover:bg-emerald-50 hover:text-brand-700">
                        Planner
                    </a>
                    <a href="{{ url_for('dashboard') }}" class="rounded-full bg-metro-ink px-4 py-2 text-sm font-medium text-white transition hover:bg-brand-700">
                        Dashboard
                    </a>
                </nav>
            </div>
        </header>

        <main class="mx-auto max-w-7xl px-6 py-8">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
